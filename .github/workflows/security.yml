name: Security Scan

on:
  workflow_run:
    workflows: ["Build and Push Docker Images"]
    types: [completed]
    branches: [main]
  schedule:
    # Daily at 6 AM UTC - scan for new CVEs
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  detect-images:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - id: set-matrix
        run: |
          IMAGES=$(ls -d images/*/ | xargs -I{} basename {} | jq -R . | jq -s -c .)
          echo "matrix={\"image\":${IMAGES}}" >> "$GITHUB_OUTPUT"

  grype-scan:
    needs: detect-images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-images.outputs.matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Verify image signature
        env:
          COSIGN_USERNAME: ${{ github.actor }}
          COSIGN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest"
          cosign verify \
            --certificate-identity-regexp "https://github.com/kubelauncher/docker/" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${IMAGE}"

      - name: Install Grype
        run: |
          curl -sSfL "https://raw.githubusercontent.com/anchore/grype/dee8de483dfba5b4e0bc0aa8e4ab2ce52137e490/install.sh" | sh -s -- -b /usr/local/bin v0.110.0

      - name: Run Grype vulnerability scanner
        env:
          GRYPE_REGISTRY_AUTH_AUTHORITY: ghcr.io
          GRYPE_REGISTRY_AUTH_USERNAME: ${{ github.actor }}
          GRYPE_REGISTRY_AUTH_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest"
          grype "${IMAGE}" --platform linux/amd64 \
            -o sarif --file grype-results.sarif \
            --only-fixed

      - name: Upload Grype scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        if: always() && hashFiles('grype-results.sarif') != ''
        with:
          sarif_file: "grype-results.sarif"
