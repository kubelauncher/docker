name: Security Scan

on:
  workflow_run:
    workflows: ["Build and Push Docker Images"]
    types: [completed]
    branches: [main]
  schedule:
    # Daily at 6 AM UTC - scan for new CVEs
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  detect-images:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - id: set-matrix
        run: |
          IMAGES=$(ls -d images/*/ | xargs -I{} basename {} | jq -R . | jq -s -c .)
          echo "matrix={\"image\":${IMAGES}}" >> "$GITHUB_OUTPUT"

  trivy-scan:
    needs: detect-images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-images.outputs.matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Verify image signature
        env:
          COSIGN_USERNAME: ${{ github.actor }}
          COSIGN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest"
          cosign verify \
            --certificate-identity-regexp "https://github.com/kubelauncher/docker/" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${IMAGE}"

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514 # v0.2.6

      - name: Run Trivy vulnerability scanner
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest"
          trivy image --platform linux/amd64 \
            --format sarif --output trivy-results.sarif \
            --severity CRITICAL,HIGH --ignore-unfixed \
            --ignorefile .trivyignore \
            "${IMAGE}"

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@38697555549f1db7851b81482ff19f1fa5c4fedc # v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: "trivy-results.sarif"

  trivy-config-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514 # v0.2.6

      - name: Run Trivy config scanner on Dockerfiles
        run: |
          trivy config \
            --format sarif --output trivy-config.sarif \
            --severity CRITICAL,HIGH,MEDIUM \
            --ignorefile .trivyignore \
            .

      - name: Upload config scan results
        uses: github/codeql-action/upload-sarif@38697555549f1db7851b81482ff19f1fa5c4fedc # v4
        if: always() && hashFiles('trivy-config.sarif') != ''
        with:
          sarif_file: "trivy-config.sarif"
