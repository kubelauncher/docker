name: Build and Push Docker Images

on:
  push:
    branches: [main]
    paths:
      - "images/**"
      - ".github/workflows/build.yml"
  pull_request:
    branches: [main]
    paths:
      - "images/**"
      - ".github/workflows/build.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write  # Required for cosign keyless signing

env:
  REGISTRY: ghcr.io

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_changes: ${{ steps.set-matrix.outputs.has_changes }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 2

      - id: set-matrix
        run: |
          # Build all images on workflow_dispatch or initial commit
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || ! git rev-parse HEAD~1 >/dev/null 2>&1; then
            IMAGES=$(ls -d images/*/ | xargs -I{} basename {} | jq -R . | jq -s -c .)
            echo "matrix={\"image\":${IMAGES}}" >> "$GITHUB_OUTPUT"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED_IMAGES=()
          for dir in images/*/; do
            image=$(basename "$dir")
            if git diff --name-only HEAD~1 HEAD -- "$dir" | grep -q .; then
              CHANGED_IMAGES+=("\"${image}\"")
            fi
          done

          if [ ${#CHANGED_IMAGES[@]} -eq 0 ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "matrix={\"image\":[]}" >> "$GITHUB_OUTPUT"
          else
            IMAGES=$(IFS=,; echo "[${CHANGED_IMAGES[*]}]")
            echo "matrix={\"image\":${IMAGES}}" >> "$GITHUB_OUTPUT"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Extract version
        id: version
        run: |
          IMAGE="${{ matrix.image }}"
          DOCKERFILE="images/${IMAGE}/Dockerfile"

          # Apt-based images: detect real installed version from built image
          VERSION_CMD=""
          case "$IMAGE" in
            mongodb)    VERSION_CMD="mongod --version | grep -oP 'db version v\K[0-9.]+'" ;;
            postgresql) VERSION_CMD="postgres --version | grep -oP '\) \K[0-9.]+'" ;;
            mysql)      VERSION_CMD="mysqld --version | grep -oP 'Ver \K[0-9.]+'" ;;
            openldap)   VERSION_CMD="slapd -VV 2>&1 | grep -oP 'slapd\s+\K[0-9.]+'" ;;
          esac

          if [ -n "$VERSION_CMD" ]; then
            echo "::group::Building single-platform image for version detection"
            docker buildx build --load --platform linux/amd64 \
              --cache-from type=gha,scope=${IMAGE} \
              --cache-to type=gha,mode=max,scope=${IMAGE} \
              -t version-detect:latest "images/${IMAGE}"
            echo "::endgroup::"

            VERSION=$(docker run --rm --entrypoint "" version-detect:latest sh -c "$VERSION_CMD")
            echo "::notice::Detected real version for ${IMAGE}: ${VERSION}"
            docker rmi version-detect:latest 2>/dev/null || true
          else
            # Source-built images: use Dockerfile ARG
            VERSION=$(grep -oP 'ARG \w+_VERSION=\K[^\s]+' "$DOCKERFILE" | head -1)
            VERSION=$(echo "$VERSION" | tr '_' '.')

            # Normalize to semver (x.y.z format)
            DOTS=$(echo "$VERSION" | tr -cd '.' | wc -c)
            if [ "$DOTS" -eq 0 ]; then
              VERSION="${VERSION}.0.0"  # 17 → 17.0.0
            elif [ "$DOTS" -eq 1 ]; then
              VERSION="${VERSION}.0"    # 8.0 → 8.0.0
            fi
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f1-2)
          echo "major=${MAJOR}" >> "$GITHUB_OUTPUT"
          echo "minor=${MINOR}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
            docker.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=${{ steps.version.outputs.minor }}
            type=raw,value=${{ steps.version.outputs.major }}
            type=raw,value=latest
            type=sha

      - name: Build and push
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: images/${{ matrix.image }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      - name: Verify multi-arch manifest
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
        run: |
          # Guard against regressions where a single-platform manifest gets
          # pushed under a multi-arch tag (happened once for mysql + rabbitmq,
          # broke arm64 consumers with "no match for platform in manifest").
          # Refuse to sign/publish anything that is not a proper OCI index
          # containing both linux/amd64 and linux/arm64.
          set -euo pipefail
          TOKEN="$(curl -sf "https://ghcr.io/token?scope=repository:${{ github.repository_owner }}/${{ matrix.image }}:pull" | jq -r .token)"
          MANIFEST="$(curl -sf "https://ghcr.io/v2/${{ github.repository_owner }}/${{ matrix.image }}/manifests/${DIGEST}" \
              -H "Accept: application/vnd.oci.image.index.v1+json,application/vnd.docker.distribution.manifest.list.v2+json" \
              -H "Authorization: Bearer $TOKEN")"
          MEDIA_TYPE="$(echo "$MANIFEST" | jq -r .mediaType)"
          case "$MEDIA_TYPE" in
            application/vnd.oci.image.index.v1+json|application/vnd.docker.distribution.manifest.list.v2+json) ;;
            *) echo "::error::${IMAGE}@${DIGEST} is a single-platform manifest ($MEDIA_TYPE), expected an OCI image index"; exit 1 ;;
          esac
          PLATFORMS="$(echo "$MANIFEST" | jq -r '[.manifests[].platform | select(.architecture != "unknown") | "\(.os)/\(.architecture)"] | sort | unique | join(",")')"
          echo "Published platforms: $PLATFORMS"
          for required in linux/amd64 linux/arm64; do
            echo "$PLATFORMS" | tr ',' '\n' | grep -qx "$required" \
              || { echo "::error::${IMAGE}@${DIGEST} missing required platform $required (got: $PLATFORMS)"; exit 1; }
          done

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign GHCR image
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
        run: |
          cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Sign Docker Hub image
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: docker.io/${{ github.repository_owner }}/${{ matrix.image }}
        run: |
          cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Generate SBOM
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
        run: |
          curl -sSfL "https://raw.githubusercontent.com/anchore/syft/860126c650c2d05b63b83a3895e41268162315a3/install.sh" | sh -s -- -b /usr/local/bin v1.42.3
          syft "${IMAGE}@${DIGEST}" --platform linux/amd64 -o spdx-json=sbom.spdx.json

      - name: Attest SBOM
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
        run: |
          cosign attest --yes --predicate sbom.spdx.json --type spdxjson "${IMAGE}@${DIGEST}"

      - name: Upload SBOM to Dependency-Track
        if: github.event_name != 'pull_request'
        env:
          DTRACK_URL: https://dependency-track.phamitservices.com
          DTRACK_API_KEY: ${{ secrets.DTRACK_API_KEY }}
        run: |
          jq -n --arg bom "$(base64 -w0 sbom.spdx.json)" \
            '{autoCreate: true, projectName: "${{ matrix.image }}", projectVersion: "${{ steps.version.outputs.version }}", bom: $bom}' > dtrack-payload.json
          curl -sSf -X PUT "${DTRACK_URL}/api/v1/bom" \
            -H "X-Api-Key: ${DTRACK_API_KEY}" \
            -H "Content-Type: application/json" \
            -d @dtrack-payload.json
