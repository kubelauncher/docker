name: Lint

on:
  push:
    branches: [main]
    paths: ["images/*/Dockerfile"]
  pull_request:
    paths: ["images/*/Dockerfile"]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  hadolint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Hadolint
        run: |
          curl -sSfL -o /usr/local/bin/hadolint \
            "https://github.com/hadolint/hadolint/releases/download/v2.14.0/hadolint-Linux-x86_64"
          chmod +x /usr/local/bin/hadolint

      - name: Run Hadolint on all Dockerfiles
        run: |
          hadolint --format sarif images/*/Dockerfile > hadolint-results.sarif || true

      - name: Upload Hadolint results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4
        if: always() && hashFiles('hadolint-results.sarif') != ''
        with:
          sarif_file: "hadolint-results.sarif"
